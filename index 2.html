<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Vāgdevi — Anatomy</title>
  <meta name="description" content="Notes, quizzes, and flashcards for MBBS anatomy, biochemistry, and physiology." />

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#231B10" />

  <!-- iOS home-screen install support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Vāgdevi" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

  <!-- favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app"></div>

  <!-- Install prompt banner (shown by app.js when eligible) -->
  <div id="install-banner" class="install-banner" hidden>
    <img src="./icon-96.png" alt="" class="install-banner-icon" />
    <div class="install-banner-text">
      <strong>Install Vāgdevi</strong>
      <span>Add it to your home screen for quick, offline access.</span>
    </div>
    <button id="install-btn" class="install-banner-btn">Install</button>
    <button id="install-dismiss" class="install-banner-dismiss" aria-label="Dismiss">×</button>
  </div>

  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch((err) => {
          console.warn("Service worker registration failed:", err);
        });
      });
    }

    // Install prompt handling (Android/desktop Chrome — beforeinstallprompt)
    let deferredInstallPrompt = null;
    const banner = document.getElementById("install-banner");
    const installBtn = document.getElementById("install-btn");
    const dismissBtn = document.getElementById("install-dismiss");

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;
      if (!localStorage.getItem("vagdevi-install-dismissed")) {
        banner.hidden = false;
      }
    });

    installBtn?.addEventListener("click", async () => {
      banner.hidden = true;
      if (deferredInstallPrompt) {
        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
      }
    });

    dismissBtn?.addEventListener("click", () => {
      banner.hidden = true;
      localStorage.setItem("vagdevi-install-dismissed", "1");
    });

    window.addEventListener("appinstalled", () => {
      banner.hidden = true;
    });
  </script>
</body>
</html>
